<header class="bg-indigo-800 text-white shadow-lg sticky top-0 z-50">
  <div class="flex items-center justify-between px-4 py-2 h-16">
    <!-- Logo -->
    <a routerLink="/dashboard" class="flex items-center gap-2 text-white no-underline flex-shrink-0">
      <div class="bg-white rounded-lg p-1.5">
        <i class="pi pi-chart-bar text-indigo-800 text-xl"></i>
      </div>
      <span class="font-bold text-lg hidden sm:block">Assets Manager</span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="hidden lg:flex items-center gap-1 flex-1 mx-4">
      <!-- Left menu items -->
      <div class="flex items-center gap-1">
        <ng-container *ngFor="let item of leftMenuItems">
          <div *ngIf="hasAccess(item)" class="relative">
            <a
              *ngIf="!item.items"
              [routerLink]="item.routerLink"
              routerLinkActive="bg-white/20"
              class="flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-white/20 transition-colors text-sm font-medium text-white no-underline"
            >
              <i [class]="item.icon" *ngIf="item.icon"></i>
              {{ item.label }}
            </a>
            <button
              *ngIf="item.items"
              class="flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-white/20 transition-colors text-sm font-medium cursor-pointer bg-transparent border-0 text-white"
              (click)="toggleDropdown(item, $event)"
            >
              <i [class]="item.icon" *ngIf="item.icon"></i>
              {{ item.label }}
              <i class="pi pi-chevron-down text-xs ml-1"></i>
            </button>
            <div *ngIf="item.items && item.open" class="dropdown-menu absolute top-full left-0 mt-1 bg-white rounded-xl shadow-2xl p-2 min-w-48 z-50">
              <ng-container *ngFor="let col of item.items">
                <a
                  *ngFor="let sub of col"
                  [routerLink]="sub.routerLink"
                  (click)="closeAllDropdowns()"
                  class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-indigo-50 text-gray-700 text-sm no-underline"
                >
                  <i [class]="sub.icon + ' text-indigo-600'" *ngIf="sub.icon"></i>
                  {{ sub.label }}
                </a>
              </ng-container>
            </div>
          </div>
        </ng-container>
      </div>

      <!-- Spacer -->
      <div class="flex-1"></div>

      <!-- Right menu items (Admin) -->
      <div class="flex items-center gap-1">
        <ng-container *ngFor="let item of rightMenuItems">
          <div *ngIf="hasAccess(item)" class="relative">
            <button
              *ngIf="item.items"
              class="flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-white/20 transition-colors text-sm font-medium cursor-pointer bg-transparent border-0 text-white"
              (click)="toggleDropdown(item, $event)"
            >
              <i [class]="item.icon" *ngIf="item.icon"></i>
              {{ item.label }}
              <i class="pi pi-chevron-down text-xs ml-1"></i>
            </button>
            <a
              *ngIf="!item.items"
              [routerLink]="item.routerLink"
              class="flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-white/20 transition-colors text-sm font-medium text-white no-underline"
            >
              <i [class]="item.icon" *ngIf="item.icon"></i>
              {{ item.label }}
            </a>
            <div *ngIf="item.items && item.open" class="dropdown-menu absolute top-full right-0 mt-1 bg-white rounded-xl shadow-2xl p-2 min-w-48 z-50">
              <ng-container *ngFor="let col of item.items">
                <a
                  *ngFor="let sub of col"
                  [routerLink]="sub.routerLink"
                  (click)="closeAllDropdowns()"
                  class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-indigo-50 text-gray-700 text-sm no-underline block"
                >
                  <i [class]="sub.icon + ' text-indigo-600'" *ngIf="sub.icon"></i>
                  {{ sub.label }}
                </a>
              </ng-container>
            </div>
          </div>
        </ng-container>
      </div>
    </nav>

    <!-- User Avatar (desktop/tablet) -->
    <div class="hidden sm:flex items-center gap-2 ml-2">
      <p-menu #userMenu [model]="userMenuItems" [popup]="true" appendTo="body"></p-menu>
      <button
        class="flex items-center gap-2 bg-white/10 hover:bg-white/20 rounded-lg px-3 py-1.5 transition-colors cursor-pointer border-0 text-white"
        (click)="userMenu.toggle($event)"
      >
        <p-avatar
          [image]="currentUser?.avatarUrl || ''"
          [label]="!currentUser?.avatarUrl ? (currentUser?.username?.charAt(0)?.toUpperCase() || 'U') : ''"
          shape="circle"
          size="normal"
          styleClass="bg-indigo-300 text-white"
        ></p-avatar>
        <span class="text-sm font-medium hidden md:block">{{ currentUser?.username }}</span>
        <i class="pi pi-chevron-down text-xs"></i>
      </button>
    </div>

    <!-- Mobile hamburger -->
    <button
      class="lg:hidden flex items-center justify-center w-10 h-10 rounded-lg hover:bg-white/20 transition-colors border-0 bg-transparent text-white cursor-pointer"
      (click)="toggleMobileMenu()"
      aria-label="Toggle menu"
    >
      <i class="pi text-xl" [class.pi-bars]="!isMobileMenuOpen()" [class.pi-times]="isMobileMenuOpen()"></i>
    </button>
  </div>

  <!-- Mobile overlay -->
  <div
    *ngIf="isMobileMenuOpen()"
    class="fixed inset-0 bg-black/50 z-40 lg:hidden"
    (click)="closeMobileMenu()"
  ></div>

  <!-- Mobile Side Drawer -->
  <nav
    class="fixed top-0 left-0 h-full w-72 bg-indigo-900 z-50 transform transition-transform duration-300 lg:hidden overflow-y-auto"
    [class.-translate-x-full]="!isMobileMenuOpen()"
    [class.translate-x-0]="isMobileMenuOpen()"
  >
    <!-- Drawer Header -->
    <div class="flex items-center justify-between p-4 border-b border-white/20">
      <div class="flex items-center gap-2">
        <div class="bg-white rounded-lg p-1.5">
          <i class="pi pi-chart-bar text-indigo-800 text-lg"></i>
        </div>
        <span class="font-bold text-white">Assets Manager</span>
      </div>
      <button
        class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/20 transition-colors border-0 bg-transparent text-white cursor-pointer"
        (click)="closeMobileMenu()"
      >
        <i class="pi pi-times"></i>
      </button>
    </div>

    <!-- User Info in drawer -->
    <div class="p-4 border-b border-white/20" *ngIf="currentUser">
      <div class="flex items-center gap-3">
        <p-avatar
          [image]="currentUser?.avatarUrl || ''"
          [label]="!currentUser?.avatarUrl ? (currentUser?.username?.charAt(0)?.toUpperCase() || 'U') : ''"
          shape="circle"
          size="large"
          styleClass="bg-indigo-300 text-white"
        ></p-avatar>
        <div>
          <p class="font-semibold text-white text-sm">{{ currentUser?.username }}</p>
          <p class="text-indigo-300 text-xs capitalize">{{ currentUser?.role }}</p>
        </div>
      </div>
    </div>

    <!-- Mobile Nav -->
    <div class="p-2">
      <ng-container *ngFor="let item of menuItems">
        <div *ngIf="hasAccess(item)" class="mb-1">
          <a
            *ngIf="!item.items"
            [routerLink]="item.routerLink"
            (click)="closeMobileMenu()"
            class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 text-white no-underline text-sm font-medium"
          >
            <i [class]="item.icon" class="w-5 text-center" *ngIf="item.icon"></i>
            {{ item.label }}
          </a>
          <div *ngIf="item.items">
            <button
              class="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 text-white text-sm font-medium border-0 bg-transparent cursor-pointer"
              (click)="item.mobileOpen = !item.mobileOpen"
            >
              <i [class]="item.icon" class="w-5 text-center" *ngIf="item.icon"></i>
              {{ item.label }}
              <i class="pi ml-auto text-xs" [class.pi-chevron-down]="!item.mobileOpen" [class.pi-chevron-up]="item.mobileOpen"></i>
            </button>
            <div *ngIf="item.mobileOpen" class="ml-4 border-l border-white/20 pl-2">
              <ng-container *ngFor="let col of item.items">
                <a
                  *ngFor="let sub of col"
                  [routerLink]="sub.routerLink"
                  (click)="closeMobileMenu()"
                  class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-white/10 text-indigo-200 no-underline text-sm"
                >
                  <i [class]="sub.icon" class="w-4 text-center text-xs" *ngIf="sub.icon"></i>
                  {{ sub.label }}
                </a>
              </ng-container>
            </div>
          </div>
        </div>
      </ng-container>

      <div class="mt-4 border-t border-white/20 pt-4">
        <button
          class="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-red-500/20 text-red-300 text-sm font-medium border-0 bg-transparent cursor-pointer"
          (click)="logout()"
        >
          <i class="pi pi-sign-out w-5 text-center"></i>
          Logout
        </button>
      </div>
    </div>
  </nav>
</header>
